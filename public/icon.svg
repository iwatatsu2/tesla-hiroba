<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#d0d0d0"/>
      <stop offset="60%" style="stop-color:#a0a0a0"/>
      <stop offset="100%" style="stop-color:#707070"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#888888"/>
      <stop offset="50%" style="stop-color:#444444"/>
      <stop offset="100%" style="stop-color:#888888"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="2" y="2" width="508" height="508" rx="111" fill="none" stroke="url(#border)" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="0" y1="128" x2="512" y2="128" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Horizontal accent line -->
  <line x1="80" y1="256" x2="432" y2="256" stroke="url(#silver)" stroke-width="1" opacity="0.15"/>
  <!-- TSLA text -->
  <text x="256" y="300" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="148" font-weight="900" text-anchor="middle" fill="url(#silver)" letter-spacing="-4">TSLA</text>
</svg>
