<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" width="32" height="48" shape-rendering="crispEdges">
  <!-- head -->
  <rect x="10" y="2" width="12" height="10" fill="#C0C0C0"/>
  <!-- eyes -->
  <rect x="12" y="5" width="3" height="3" fill="#00FFFF"/>
  <rect x="17" y="5" width="3" height="3" fill="#00FFFF"/>
  <!-- neck -->
  <rect x="14" y="12" width="4" height="3" fill="#808080"/>
  <!-- torso -->
  <rect x="8" y="15" width="16" height="14" fill="#C0C0C0"/>
  <!-- chest mark -->
  <rect x="13" y="18" width="6" height="4" fill="#00FFFF" opacity="0.6"/>
  <!-- arms -->
  <rect x="2" y="15" width="6" height="12" fill="#808080"/>
  <rect x="24" y="15" width="6" height="12" fill="#808080"/>
  <!-- legs -->
  <rect x="8" y="29" width="6" height="14" fill="#808080"/>
  <rect x="18" y="29" width="6" height="14" fill="#808080"/>
  <!-- feet -->
  <rect x="6" y="42" width="8" height="4" fill="#C0C0C0"/>
  <rect x="18" y="42" width="8" height="4" fill="#C0C0C0"/>
</svg>
